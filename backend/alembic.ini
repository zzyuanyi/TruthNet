# Alembic config - TruthNet MySQL 8.4
# Usage: cd backend && alembic -c alembic.ini upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = mysql+pymysql://truthnet:changeme@127.0.0.1:3306/truthnet?charset=utf8mb4

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
