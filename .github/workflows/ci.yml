name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Encoding & Path Audit (CI)
        run: python scripts/encoding_path_audit.py --ci

      - name: Git Safety Check (CI)
        run: python scripts/git_safety_check.py --ci

      - name: Environment Bootstrap Check (CI)
        run: python scripts/env_bootstrap.py --ci --check

      - name: Doctor (CI mode)
        run: python scripts/doctor.py --ci

      - name: Run tests
        run: python -m pytest backend/tests -v

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  frontend:
    needs: python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend exists
        id: check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "frontend_exists=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Set up Node.js
        if: steps.check.outputs.frontend_exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack
        if: steps.check.outputs.frontend_exists == 'true'
        run: corepack enable

      - name: Install frontend dependencies
        if: steps.check.outputs.frontend_exists == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.check.outputs.frontend_exists == 'true'
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        if: steps.check.outputs.frontend_exists == 'true'
        working-directory: frontend
        run: pnpm build

      - name: Frontend not initialized
        if: steps.check.outputs.frontend_exists == 'false'
        run: echo "Frontend not initialized — skipping frontend CI."
